<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>JKT48 Team Lightstick</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --main1: #ff7eb6;
      --main2: #ff2d55;
      --main3: #ffd1e6;
      --glow: rgba(255,79,163,0.72);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: Arial, sans-serif;
      color: white;
      background: #120014;
    }

    /* LOADING SCREEN GAMBAR + SUARA */
    #loadingScreen {
      position: fixed;
      inset: 0;
      z-index: 999999;
      background:
        radial-gradient(circle at center, rgba(255,126,182,.95), transparent 28%),
        radial-gradient(circle at top, #ff2d55, transparent 46%),
        linear-gradient(180deg, #21001f, #520040, #140014);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      transition: opacity .8s ease, visibility .8s ease;
    }

    #loadingScreen.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-card {
      width: 90%;
      max-width: 360px;
      padding: 18px 16px;
      text-align: center;
      border-radius: 28px;
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.28);
      box-shadow: 0 0 42px rgba(255,79,163,.9);
      backdrop-filter: blur(14px);
    }

    .loading-img {
      width: 210px;
      height: 280px;
      object-fit: cover;
      object-position: center top;
      border-radius: 24px;
      border: 4px solid rgba(255,255,255,.95);
      background: white;
      box-shadow:
        0 0 0 8px rgba(255,255,255,.18),
        0 0 38px rgba(255,79,163,1);
      animation: loadingPhotoPulse 1.7s infinite ease-in-out;
    }

    .loader-logo {
      margin-top: 16px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow:
        0 0 18px rgba(255,255,255,.75),
        0 0 28px rgba(255,79,163,1);
    }

    .loader-heart {
      font-size: 40px;
      margin-top: 6px;
      filter: drop-shadow(0 0 16px white);
      animation: loadingHeart 1s infinite ease-in-out;
    }

    .start-btn {
      margin-top: 14px;
      padding: 12px 24px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #fff, #ff8ac7);
      color: #82003d;
      font-size: 15px;
      font-weight: 900;
      box-shadow: 0 0 24px rgba(255,79,163,.95);
      cursor: pointer;
      animation: loadingButtonPulse 1.3s infinite ease-in-out;
    }

    .start-btn:active {
      transform: scale(.95);
    }

    .loader-bar {
      width: 200px;
      height: 8px;
      margin: 18px auto 0;
      border-radius: 999px;
      background: rgba(255,255,255,.25);
      overflow: hidden;
      display: none;
    }

    .loader-bar span {
      display: block;
      width: 45%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #fff, #ff8ac7, #ff2d55);
      animation: loadingMove 1.1s infinite ease-in-out;
    }

    .loader-text {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 700;
      opacity: .9;
    }

    @keyframes loadingPhotoPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow:
          0 0 0 8px rgba(255,255,255,.18),
          0 0 30px rgba(255,79,163,.85);
      }
      50% {
        transform: scale(1.04);
        box-shadow:
          0 0 0 12px rgba(255,255,255,.23),
          0 0 54px rgba(255,79,163,1);
      }
    }

    @keyframes loadingHeart {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.25); }
    }

    @keyframes loadingButtonPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 20px rgba(255,79,163,.75);
      }
      50% {
        transform: scale(1.06);
        box-shadow: 0 0 36px rgba(255,79,163,1);
      }
    }

    @keyframes loadingMove {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(250%); }
    }

    /* FULL PAGE */
    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 10px 14px 10px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at center, var(--main1), transparent 18%),
        radial-gradient(circle at top, var(--main2), transparent 44%),
        linear-gradient(180deg, #21001f, #520040, #140014);
      transition: background .5s ease;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.9) 1px, transparent 2px),
        radial-gradient(circle, var(--main3) 2px, transparent 4px);
      background-size: 42px 42px, 90px 90px;
      opacity: .5;
      animation: bgMove 10s linear infinite;
      pointer-events: none;
    }

    @keyframes bgMove {
      from { transform: translateY(0); }
      to { transform: translateY(-90px); }
    }

    .light-lines {
      position: absolute;
      inset: 0;
      background: repeating-conic-gradient(
        from 0deg,
        rgba(255,255,255,.15) 0deg,
        transparent 2deg,
        transparent 10deg
      );
      mask-image: radial-gradient(circle at center, black 0%, transparent 60%);
      opacity: .4;
      animation: rotateLine 28s linear infinite;
      pointer-events: none;
    }

    @keyframes rotateLine {
      to { transform: rotate(360deg); }
    }

    .content {
      position: relative;
      z-index: 5;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
    }

    h1 {
      font-size: clamp(20px, 5.5vw, 28px);
      font-weight: 900;
      letter-spacing: .5px;
      line-height: 1.1;
      text-shadow: 0 0 10px rgba(255,255,255,.5), 0 0 24px var(--glow);
      text-align: center;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      width: 100%;
    }

    .tab {
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 999px;
      padding: 8px 4px;
      color: white;
      background: rgba(255,255,255,.12);
      font-weight: 800;
      font-size: 11px;
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: background .2s, transform .1s;
    }

    .tab:active {
      transform: scale(.95);
    }

    .tab.active {
      background: linear-gradient(135deg, var(--main1), var(--main2));
      box-shadow: 0 0 16px var(--glow);
    }

    .video-toggle {
      width: 100%;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 12px;
      padding: 7px 14px;
      background: rgba(255,255,255,.1);
      color: white;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(6px);
      text-align: center;
      transition: background .2s;
    }

    .video-toggle:active {
      transform: scale(.97);
    }

    .video-wrap {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,.25);
      box-shadow: 0 0 24px var(--glow);
      display: none;
    }

    .video-wrap.open {
      display: block;
    }

    .video-wrap iframe {
      width: 100%;
      aspect-ratio: 16/9;
      display: block;
      border: none;
    }

    .photo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      width: 100%;
      flex-shrink: 0;
      margin-top: 35px;
    }

    .photo-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,.18);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      transition: background .15s;
      z-index: 10;
    }

    .photo-nav:active {
      background: rgba(255,255,255,.4);
      transform: translateY(-50%) scale(.9);
    }

    .photo-nav.prev {
      left: 2px;
    }

    .photo-nav.next {
      right: 2px;
    }

    .member-card {
      width: 148px;
      height: 148px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      position: relative;
      background: rgba(255,255,255,.15);
      box-shadow:
        0 0 0 3px rgba(255,255,255,.9),
        0 0 0 7px rgba(255,255,255,.2),
        0 0 36px var(--glow);
      animation: popPhoto .4s ease forwards, pulsePhoto 2.2s infinite ease-in-out .5s;
    }

    .member-card.show {
      display: flex;
    }

    @keyframes popPhoto {
      from { transform: scale(.3) rotate(-10deg); opacity: 0; }
      to { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes pulsePhoto {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    .member-card::before {
      content: "";
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.25);
      animation: spin 8s linear infinite;
    }

    .member-card::after {
      content: "";
      position: absolute;
      inset: -28px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.15);
      animation: spin 14s linear infinite reverse;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .member-photo {
      width: 118px;
      height: 118px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 3px solid white;
      background: white;
      position: relative;
      z-index: 2;
    }

    .team-name {
      font-size: 18px;
      font-weight: 900;
      text-shadow: 0 0 14px rgba(0,0,0,.8);
      text-align: center;
      margin-top: 10px;
    }

    .counter {
      color: rgba(255,255,255,.85);
      font-size: 12px;
      font-weight: bold;
      text-align: center;
      margin-top: 4px;
    }

    .progress-bar {
      width: 110px;
      height: 3px;
      background: rgba(255,255,255,.2);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 4px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--main1), var(--main2));
      border-radius: 999px;
      transition: width .3s ease;
    }

    .quote {
      font-size: clamp(13px, 3.8vw, 16px);
      line-height: 1.4;
      text-shadow: 0 0 12px rgba(0,0,0,.9);
      text-align: center;
      max-width: 360px;
      opacity: 1;
      transition: opacity .2s;
      margin-top: 10px;
    }

    .quote.fading {
      opacity: 0;
    }

    .main-btn {
      border: none;
      border-radius: 999px;
      padding: 13px 24px;
      width: 100%;
      max-width: 300px;
      color: white;
      font-size: 17px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--main1), var(--main2));
      box-shadow: 0 0 24px var(--glow), 0 8px 20px rgba(0,0,0,.35);
      cursor: pointer;
      transition: transform .1s, box-shadow .15s;
      flex-shrink: 0;
      margin-top: 12px;
    }

    .main-btn:active {
      transform: scale(.95);
    }

    .effect-item {
      position: fixed;
      pointer-events: none;
      z-index: 99;
      filter: drop-shadow(0 0 8px white);
    }

    .love-effect {
      animation: loveFloat 2.8s ease-out forwards;
    }

    .dream-effect {
      animation: dreamStar 3s ease-out forwards;
    }

    .passion-effect {
      animation: passionFire 2.4s ease-out forwards;
    }

    @keyframes loveFloat {
      0% { opacity: 1; transform: translateY(0) scale(.6) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-300px) scale(1.7) rotate(28deg); }
    }

    @keyframes dreamStar {
      0% { opacity: 0; transform: translateY(0) translateX(0) scale(.4) rotate(0deg); }
      15% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-250px) translateX(80px) scale(1.6) rotate(220deg); }
    }

    @keyframes passionFire {
      0% { opacity: 1; transform: translateY(0) scale(.5) rotate(0deg); }
      45% { opacity: 1; transform: translateY(-110px) scale(1.2) rotate(-12deg); }
      100% { opacity: 0; transform: translateY(-270px) scale(.4) rotate(30deg); }
    }

    .flash {
      position: fixed;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 80;
      background: radial-gradient(circle, rgba(255,255,255,.7), transparent 58%);
    }

    .flash.show {
      animation: flashFX .4s ease;
    }

    @keyframes flashFX {
      0% { opacity: 0; }
      35% { opacity: 1; }
      100% { opacity: 0; }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%) translateY(30px);
      z-index: 120;
      padding: 11px 16px;
      border-radius: 999px;
      background: rgba(0,0,0,.72);
      color: white;
      font-weight: 800;
      font-size: 14px;
      opacity: 0;
      box-shadow: 0 0 18px var(--glow);
      backdrop-filter: blur(10px);
      transition: .3s ease;
      width: calc(100% - 32px);
      max-width: 360px;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* CATATAN FANMADE */
    .fanmade-note {
      position: fixed;
      left: 50%;
      bottom: 5px;
      transform: translateX(-50%);
      z-index: 200;
      width: 100%;
      padding: 0 12px;
      font-size: 9px;
      font-weight: 600;
      color: rgba(255,255,255,.65);
      text-align: center;
      text-shadow: 0 0 8px rgba(0,0,0,.8);
      pointer-events: none;
    }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .page {
        padding-bottom: calc(10px + env(safe-area-inset-bottom));
      }

      .fanmade-note {
        bottom: calc(5px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>

<body>

  <!-- LOADING SCREEN GAMBAR + SUARA -->
  <div id="loadingScreen">
    <audio id="loadingSound" src="loading.mp3" preload="auto"></audio>

    <div class="loading-card">
      <img src="loading.png" class="loading-img" alt="Loading JKT48">

      <div class="loader-logo">KAPTEN JKT48</div>
      <div class="loader-heart">💖</div>

      <button id="startBtn" class="start-btn">Ketuk untuk mulai</button>

      <div class="loader-bar" id="loaderBar">
        <span></span>
      </div>

      <div class="loader-text" id="loaderText">Siapkan lightstick kamu...</div>
    </div>
  </div>

  <main class="page">
    <div class="light-lines"></div>

    <div class="content">
      <h1 id="title">TEAM LOVE JKT48</h1>

      <div class="tabs">
        <button class="tab" id="tab-love" onclick="changeTeam('love')">💖 Love</button>
        <button class="tab" id="tab-dream" onclick="changeTeam('dream')">🌟 Dream</button>
        <button class="tab" id="tab-passion" onclick="changeTeam('passion')">🔥 Passion</button>
      </div>

      <button class="video-toggle" id="videoToggle" onclick="toggleVideo()">▶ Tonton Video MV</button>

      <div class="video-wrap" id="videoWrap">
        <iframe id="youtubeFrame" src="" title="JKT48 Video"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>

      <div class="photo-area" id="photoArea">
        <button class="photo-nav prev" onclick="prevPhoto()" aria-label="Sebelumnya">&#8592;</button>

        <div class="member-card show" id="memberCard">
          <img id="memberPhoto" class="member-photo" src="love1.jpg" alt="Foto Team" />
        </div>

        <button class="photo-nav next" onclick="nextPhoto()" aria-label="Selanjutnya">&#8594;</button>
      </div>

      <div class="team-name" id="teamName">Team Love 💖</div>
      <div class="counter" id="counter">Foto 1 dari 15</div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:6.67%"></div>
      </div>

      <p class="quote" id="quote">Saat oshi tersenyum, dunia terasa lebih terang.</p>

      <button class="main-btn" onclick="nyalakanLightstick()">⚡ Nyalakan Lightstick</button>
    </div>
  </main>

  <div class="flash" id="flash"></div>
  <div class="toast" id="toast"></div>

  <div class="fanmade-note">
    Fanmade website • Bukan situs resmi JKT48
  </div>

  <script>
    const teams = {
      love: {
        title: "TEAM LOVE JKT48",
        name: "Team Love",
        emoji: "💖",
        youtube: "9iWB3ZuXOz8",
        color1: "#ff7eb6",
        color2: "#ff2d55",
        color3: "#ffd1e6",
        glow: "rgba(255,79,163,0.72)",
        quote: "Saat oshi tersenyum, dunia terasa lebih terang.",
        buttonText: "Team Love menyala 💖",
        animationType: "love",
        photos: [
          "love1.jpg","love2.jpg","love3.jpg","love4.jpg","love5.jpg",
          "love6.jpg","love7.jpg","love8.jpg","love9.jpg","love10.jpg",
          "love11.jpg","love12.jpg","love13.jpg","love14.jpg","love15.jpg"
        ]
      },
      dream: {
        title: "TEAM DREAM JKT48",
        name: "Team Dream",
        emoji: "🌟",
        youtube: "n3EpgnAqlvE",
        color1: "#00c8d7",
        color2: "#ffd166",
        color3: "#dffcff",
        glow: "rgba(0,200,215,0.75)",
        quote: "Mimpi bersinar seperti bintang, pelan-pelan tapi pasti sampai.",
        buttonText: "Team Dream menyala 🌟",
        animationType: "dream",
        photos: [
          "dream1.jpg","dream2.jpg","dream3.jpg","dream4.jpg","dream5.jpg",
          "dream6.jpg","dream7.jpg","dream8.jpg","dream9.jpg","dream10.jpg",
          "dream11.jpg","dream12.jpg","dream13.jpg","dream14.jpg"
        ]
      },
      passion: {
        title: "TEAM PASSION JKT48",
        name: "Team Passion",
        emoji: "🔥",
        youtube: "QtdsUJxiwNM",
        color1: "#ff6a00",
        color2: "#d62828",
        color3: "#ffd166",
        glow: "rgba(255,106,0,0.75)",
        quote: "Semangat menyala, langkah kecil pun tetap berarti.",
        buttonText: "Team Passion menyala 🔥",
        animationType: "passion",
        photos: [
          "passion1.jpg","passion2.jpg","passion3.jpg","passion4.jpg","passion5.jpg",
          "passion6.jpg","passion7.jpg","passion8.jpg","passion9.jpg","passion10.jpg",
          "passion11.jpg","passion12.jpg","passion13.jpg","passion14.jpg","passion15.jpg"
        ]
      }
    };

    let currentTeam = "love";
    const photoIndex = { love: 0, dream: 0, passion: 0 };
    let videoOpen = false;

    /* LOADING GAMBAR + SUARA */
    const loadingScreen = document.getElementById("loadingScreen");
    const startBtn = document.getElementById("startBtn");
    const loadingSound = document.getElementById("loadingSound");
    const loaderBar = document.getElementById("loaderBar");
    const loaderText = document.getElementById("loaderText");

    startBtn.addEventListener("click", function () {
      startBtn.style.display = "none";
      loaderBar.style.display = "block";
      loaderText.textContent = "Menyalakan lightstick...";

      loadingSound.volume = 0.8;

      loadingSound.play().catch(function () {
        console.log("Suara diblokir browser");
      });

      setTimeout(function () {
        loadingScreen.classList.add("hide");
        loadingSound.pause();
        loadingSound.currentTime = 0;
      }, 3000);
    });

    function preloadNext(team, idx) {
      const photos = teams[team].photos;
      const next = ((idx + 1) % photos.length + photos.length) % photos.length;
      const img = new Image();
      img.src = photos[next];
    }

    function setPhoto(team, idx) {
      const photos = teams[team].photos;
      const safeIdx = ((idx % photos.length) + photos.length) % photos.length;
      photoIndex[team] = safeIdx;

      const imgEl = document.getElementById("memberPhoto");
      imgEl.src = photos[safeIdx];

      const card = document.getElementById("memberCard");
      card.classList.remove("show");
      void card.offsetWidth;
      card.classList.add("show");

      document.getElementById("counter").textContent =
        "Foto " + (safeIdx + 1) + " dari " + photos.length;

      document.getElementById("progressFill").style.width =
        ((safeIdx + 1) / photos.length * 100).toFixed(2) + "%";

      preloadNext(team, safeIdx);
    }

    function prevPhoto() {
      setPhoto(currentTeam, photoIndex[currentTeam] - 1);
    }

    function nextPhoto() {
      setPhoto(currentTeam, photoIndex[currentTeam] + 1);
    }

    let txStart = null;

    document.getElementById("photoArea").addEventListener("touchstart", function (e) {
      txStart = e.touches[0].clientX;
    }, { passive: true });

    document.getElementById("photoArea").addEventListener("touchend", function (e) {
      if (txStart === null) return;

      const dx = e.changedTouches[0].clientX - txStart;

      if (Math.abs(dx) > 35) {
        dx < 0 ? nextPhoto() : prevPhoto();
      }

      txStart = null;
    });

    function toggleVideo() {
      videoOpen = !videoOpen;

      const wrap = document.getElementById("videoWrap");
      const toggle = document.getElementById("videoToggle");
      const frame = document.getElementById("youtubeFrame");
      const team = teams[currentTeam];

      wrap.classList.toggle("open", videoOpen);
      toggle.textContent = videoOpen ? "✕ Tutup Video" : "▶ Tonton Video MV";

      if (videoOpen) {
        frame.src = "https://www.youtube.com/embed/" + team.youtube + "?rel=0&modestbranding=1&autoplay=1";
      } else {
        frame.src = "";
      }
    }

    function changeTeam(teamKey) {
      currentTeam = teamKey;
      const team = teams[teamKey];

      document.documentElement.style.setProperty("--main1", team.color1);
      document.documentElement.style.setProperty("--main2", team.color2);
      document.documentElement.style.setProperty("--main3", team.color3);
      document.documentElement.style.setProperty("--glow", team.glow);

      document.getElementById("title").textContent = team.title;
      document.getElementById("teamName").textContent = team.name + " " + team.emoji;

      const q = document.getElementById("quote");
      q.classList.add("fading");

      setTimeout(function () {
        q.textContent = team.quote;
        q.classList.remove("fading");
      }, 180);

      if (videoOpen) {
        document.getElementById("youtubeFrame").src =
          "https://www.youtube.com/embed/" + team.youtube + "?rel=0&modestbranding=1&autoplay=1";
      }

      photoIndex[teamKey] = 0;
      document.getElementById("memberPhoto").src = team.photos[0];

      const card = document.getElementById("memberCard");
      card.classList.remove("show");
      void card.offsetWidth;
      card.classList.add("show");

      document.getElementById("counter").textContent = "Foto 1 dari " + team.photos.length;

      document.getElementById("progressFill").style.width =
        (1 / team.photos.length * 100).toFixed(2) + "%";

      document.querySelectorAll(".tab").forEach(function (b) {
        b.classList.remove("active");
      });

      document.getElementById("tab-" + teamKey).classList.add("active");

      preloadNext(teamKey, 0);
    }

    function nyalakanLightstick() {
      const team = teams[currentTeam];

      setPhoto(currentTeam, photoIndex[currentTeam] + 1);

      const fl = document.getElementById("flash");
      fl.classList.remove("show");
      void fl.offsetWidth;
      fl.classList.add("show");

      showToast(team.buttonText);

      if (team.animationType === "love") loveAnim();
      if (team.animationType === "dream") dreamAnim();
      if (team.animationType === "passion") passionAnim();
    }

    function loveAnim() {
      const icons = ["💖","💗","💕","💞","❤️"];

      for (let i = 0; i < 35; i++) {
        setTimeout(function () {
          spawnFX(icons[i % icons.length], "love-effect", 70, 20, 34);
        }, i * 40);
      }
    }

    function dreamAnim() {
      const icons = ["⭐","🌟","✨","💫","🌙"];

      for (let i = 0; i < 40; i++) {
        setTimeout(function () {
          spawnFX(icons[i % icons.length], "dream-effect", Math.random() * 200 + 70, 18, 32);
        }, i * 50);
      }
    }

    function passionAnim() {
      const icons = ["🔥","⚡","✨","🟠","💥"];

      for (let i = 0; i < 42; i++) {
        setTimeout(function () {
          spawnFX(icons[i % icons.length], "passion-effect", 60, 20, 36);
        }, i * 35);
      }
    }

    function spawnFX(text, cls, bottom, minSz, maxSz) {
      const el = document.createElement("div");

      el.className = "effect-item " + cls;
      el.textContent = text;
      el.style.left = Math.random() * window.innerWidth + "px";
      el.style.bottom = bottom + "px";
      el.style.fontSize = (Math.random() * (maxSz - minSz) + minSz) + "px";

      document.body.appendChild(el);

      setTimeout(function () {
        el.remove();
      }, 3200);
    }

    function showToast(text) {
      const t = document.getElementById("toast");

      t.textContent = text;
      t.classList.add("show");

      setTimeout(function () {
        t.classList.remove("show");
      }, 1800);
    }

    function preloadAll() {
      Object.keys(teams).forEach(function (key) {
        teams[key].photos.forEach(function (src) {
          const img = new Image();
          img.src = src;
        });
      });
    }

    changeTeam("love");

    window.addEventListener("load", preloadAll);
  </script>
</body>
</html>
