<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JKT48 Team Lightstick</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --main1: #ff7eb6;
      --main2: #ff2d55;
      --main3: #ffd1e6;
      --glow: rgba(255, 79, 163, 0.72);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background: #120014;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      padding: 28px 16px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at center, var(--main1), transparent 18%),
        radial-gradient(circle at top, var(--main2), transparent 44%),
        linear-gradient(180deg, #21001f, #520040, #140014);
      transition: 0.6s ease;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.9) 1px, transparent 2px),
        radial-gradient(circle, var(--main3) 2px, transparent 4px);
      background-size: 42px 42px, 90px 90px;
      opacity: .68;
      animation: bgMove 10s linear infinite;
      pointer-events: none;
    }

    @keyframes bgMove {
      from {
        transform: translateY(0);
      }

      to {
        transform: translateY(-90px);
      }
    }

    .light-lines {
      position: absolute;
      inset: 0;
      background:
        repeating-conic-gradient(
          from 0deg,
          rgba(255,255,255,.18) 0deg,
          transparent 2deg,
          transparent 10deg
        );
      mask-image: radial-gradient(circle at center, black 0%, transparent 58%);
      opacity: .45;
      animation: rotateLines 28s linear infinite;
      pointer-events: none;
    }

    @keyframes rotateLines {
      to {
        transform: rotate(360deg);
      }
    }

    .content {
      position: relative;
      z-index: 5;
      width: 100%;
      max-width: 470px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(34px, 9vw, 52px);
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow:
        0 0 12px rgba(255,255,255,.55),
        0 0 28px var(--glow);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }

    .tab {
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 999px;
      padding: 11px 6px;
      color: white;
      background: rgba(255,255,255,.12);
      font-weight: 800;
      font-size: 12px;
      backdrop-filter: blur(8px);
    }

    .tab.active {
      background: linear-gradient(135deg, var(--main1), var(--main2));
      box-shadow: 0 0 22px var(--glow);
    }

    .video-card {
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,.28);
      box-shadow: 0 0 32px var(--glow);
      background: rgba(0,0,0,.55);
      margin-bottom: 48px;
    }

    .video-card iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      border: none;
    }

    .photo-area {
      min-height: 315px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .empty-text {
      font-size: 22px;
      line-height: 1.35;
      color: rgba(255,255,255,.92);
      text-shadow: 0 0 14px rgba(0,0,0,.8);
      padding: 35px 10px;
    }

    .empty-text.hide {
      display: none;
    }

    .member-card {
      width: 252px;
      height: 252px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      position: relative;
      background: rgba(255,255,255,.15);
      box-shadow:
        0 0 0 5px rgba(255,255,255,.92),
        0 0 0 13px rgba(255,255,255,.22),
        0 0 65px var(--glow);
      animation: popPhoto .7s ease forwards, pulsePhoto 2s infinite ease-in-out .8s;
    }

    .member-card.show {
      display: flex;
    }

    @keyframes popPhoto {
      from {
        transform: scale(.25) rotate(-12deg);
        opacity: 0;
      }

      to {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    @keyframes pulsePhoto {
      0%, 100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.04);
      }
    }

    .member-card::before {
      content: "";
      position: absolute;
      inset: -36px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.28);
      animation: spin 8s linear infinite;
    }

    .member-card::after {
      content: "";
      position: absolute;
      inset: -68px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.18);
      animation: spin 14s linear infinite reverse;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .member-photo {
      width: 212px;
      height: 212px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 4px solid white;
      background: white;
      position: relative;
      z-index: 2;
    }

    .team-name {
      margin-top: 22px;
      font-size: 28px;
      font-weight: 900;
      text-shadow: 0 0 18px rgba(0,0,0,.85);
    }

    .counter {
      margin-top: 6px;
      color: rgba(255,255,255,.86);
      font-size: 15px;
      font-weight: bold;
    }

    .quote {
      margin: 24px auto 24px;
      max-width: 420px;
      font-size: clamp(21px, 5.5vw, 28px);
      line-height: 1.35;
      text-shadow: 0 0 14px rgba(0,0,0,.9);
    }

    .main-btn {
      border: none;
      border-radius: 999px;
      padding: 18px 30px;
      min-width: 260px;
      color: white;
      font-size: 21px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--main1), var(--main2));
      box-shadow:
        0 0 28px var(--glow),
        0 12px 28px rgba(0,0,0,.35);
    }

    .main-btn:active,
    .tab:active {
      transform: scale(.96);
    }

    .effect-item {
      position: fixed;
      pointer-events: none;
      z-index: 99;
      filter: drop-shadow(0 0 10px white);
    }

    .love-effect {
      animation: loveFloat 2.8s ease-out forwards;
    }

    @keyframes loveFloat {
      0% {
        opacity: 1;
        transform: translateY(0) scale(.6) rotate(0deg);
      }

      100% {
        opacity: 0;
        transform: translateY(-310px) scale(1.8) rotate(28deg);
      }
    }

    .dream-effect {
      animation: dreamStar 3s ease-out forwards;
    }

    @keyframes dreamStar {
      0% {
        opacity: 0;
        transform: translateY(0) translateX(0) scale(.4) rotate(0deg);
      }

      15% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translateY(-260px) translateX(90px) scale(1.7) rotate(220deg);
      }
    }

    .passion-effect {
      animation: passionFire 2.4s ease-out forwards;
    }

    @keyframes passionFire {
      0% {
        opacity: 1;
        transform: translateY(0) scale(.5) rotate(0deg);
      }

      45% {
        opacity: 1;
        transform: translateY(-120px) scale(1.3) rotate(-12deg);
      }

      100% {
        opacity: 0;
        transform: translateY(-280px) scale(.4) rotate(30deg);
      }
    }

    .flash {
      position: fixed;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 80;
      background: radial-gradient(circle, rgba(255,255,255,.72), transparent 58%);
    }

    .flash.show {
      animation: flashEffect .55s ease;
    }

    @keyframes flashEffect {
      0% {
        opacity: 0;
      }

      40% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(30px);
      z-index: 120;
      padding: 13px 18px;
      border-radius: 999px;
      background: rgba(0,0,0,.7);
      color: white;
      font-weight: 800;
      opacity: 0;
      box-shadow: 0 0 22px var(--glow);
      backdrop-filter: blur(10px);
      transition: .35s ease;
      width: calc(100% - 32px);
      max-width: 390px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>

  <main class="page">
    <div class="light-lines"></div>

    <section class="content">
      <h1 id="title">TEAM LOVE JKT48</h1>

      <div class="tabs">
        <button class="tab" id="tab-love" onclick="changeTeam('love')">💖 Love</button>
        <button class="tab" id="tab-dream" onclick="changeTeam('dream')">🌟 Dream</button>
        <button class="tab" id="tab-passion" onclick="changeTeam('passion')">🔥 Passion</button>
      </div>

      <div class="video-card">
        <iframe
          id="youtubeFrame"
          src=""
          title="JKT48 Video"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>

      <div class="photo-area">
        <div class="empty-text" id="emptyText">
          Pilih team lalu tekan tombol lightstick.<br>
          Foto member akan muncul sesuai team.
        </div>

        <div class="member-card" id="memberCard">
          <img id="memberPhoto" class="member-photo" src="love1.jpg" alt="Foto Team">
        </div>
      </div>

      <div class="team-name" id="teamName">Team Love 💖</div>
      <div class="counter" id="counter">Foto belum dinyalakan</div>

      <p class="quote" id="quote">
        Saat oshi tersenyum, dunia terasa lebih terang.
      </p>

      <button class="main-btn" onclick="nyalakanLightstick()">
        Nyalakan Lightstick
      </button>
    </section>
  </main>

  <div class="flash" id="flash"></div>
  <div class="toast" id="toast">Lightstick menyala!</div>

  <script>
    const teams = {
      love: {
        title: "TEAM LOVE JKT48",
        name: "Team Love",
        emoji: "💖",
        youtube: "9iWB3ZuXOz8",
        color1: "#ff7eb6",
        color2: "#ff2d55",
        color3: "#ffd1e6",
        glow: "rgba(255, 79, 163, 0.72)",
        quote: "Saat oshi tersenyum, dunia terasa lebih terang.",
        buttonText: "Team Love menyala 💖",
        animationType: "love",
        photos: [
          "love1.jpg",
          "love2.jpg",
          "love3.jpg",
          "love4.jpg",
          "love5.jpg",
          "love6.jpg",
          "love7.jpg",
          "love8.jpg",
          "love9.jpg",
          "love10.jpg",
          "love11.jpg",
          "love12.jpg",
          "love13.jpg",
          "love14.jpg",
          "love15.jpg"
        ]
      },

      dream: {
        title: "TEAM DREAM JKT48",
        name: "Team Dream",
        emoji: "🌟",
        youtube: "n3EpgnAqlvE",
        color1: "#00c8d7",
        color2: "#ffd166",
        color3: "#dffcff",
        glow: "rgba(0, 200, 215, 0.75)",
        quote: "Mimpi bersinar seperti bintang, pelan-pelan tapi pasti sampai.",
        buttonText: "Team Dream menyala 🌟",
        animationType: "dream",
        photos: [
          "dream1.jpg",
          "dream2.jpg",
          "dream3.jpg",
          "dream4.jpg",
          "dream5.jpg",
          "dream6.jpg",
          "dream7.jpg",
          "dream8.jpg",
          "dream9.jpg",
          "dream10.jpg",
          "dream11.jpg",
          "dream12.jpg",
          "dream13.jpg",
          "dream14.jpg"
        ]
      },

      passion: {
        title: "TEAM PASSION JKT48",
        name: "Team Passion",
        emoji: "🔥",
        youtube: "QtdsUJxiwNM",
        color1: "#ff6a00",
        color2: "#d62828",
        color3: "#ffd166",
        glow: "rgba(255, 106, 0, 0.75)",
        quote: "Semangat menyala, langkah kecil pun tetap berarti.",
        buttonText: "Team Passion menyala 🔥",
        animationType: "passion",
        photos: [
          "passion1.jpg",
          "passion2.jpg",
          "passion3.jpg",
          "passion4.jpg",
          "passion5.jpg",
          "passion6.jpg",
          "passion7.jpg",
          "passion8.jpg",
          "passion9.jpg",
          "passion10.jpg",
          "passion11.jpg",
          "passion12.jpg",
          "passion13.jpg",
          "passion14.jpg",
          "passion15.jpg"
        ]
      }
    };

    let currentTeam = "love";

    const photoIndex = {
      love: 0,
      dream: 0,
      passion: 0
    };

    const title = document.getElementById("title");
    const youtubeFrame = document.getElementById("youtubeFrame");
    const memberPhoto = document.getElementById("memberPhoto");
    const memberCard = document.getElementById("memberCard");
    const emptyText = document.getElementById("emptyText");
    const teamName = document.getElementById("teamName");
    const quote = document.getElementById("quote");
    const flash = document.getElementById("flash");
    const toast = document.getElementById("toast");
    const counter = document.getElementById("counter");

    function changeTeam(teamKey) {
      currentTeam = teamKey;
      const team = teams[teamKey];

      document.documentElement.style.setProperty("--main1", team.color1);
      document.documentElement.style.setProperty("--main2", team.color2);
      document.documentElement.style.setProperty("--main3", team.color3);
      document.documentElement.style.setProperty("--glow", team.glow);

      title.innerText = team.title;
      teamName.innerText = team.name + " " + team.emoji;
      quote.innerText = team.quote;

      youtubeFrame.src = "https://www.youtube.com/embed/" + team.youtube;

      memberCard.classList.remove("show");
      emptyText.classList.remove("hide");
      counter.innerText = "Foto belum dinyalakan";

      document.querySelectorAll(".tab").forEach((btn) => {
        btn.classList.remove("active");
      });

      document.getElementById("tab-" + teamKey).classList.add("active");
    }

    function nyalakanLightstick() {
      const team = teams[currentTeam];
      const index = photoIndex[currentTeam];
      const photo = team.photos[index];

      memberPhoto.src = photo;

      emptyText.classList.add("hide");

      memberCard.classList.remove("show");
      void memberCard.offsetWidth;
      memberCard.classList.add("show");

      counter.innerText = "Foto " + (index + 1) + " dari " + team.photos.length;

      photoIndex[currentTeam]++;

      if (photoIndex[currentTeam] >= team.photos.length) {
        photoIndex[currentTeam] = 0;
      }

      flash.classList.remove("show");
      void flash.offsetWidth;
      flash.classList.add("show");

      showToast(team.buttonText);

      if (team.animationType === "love") {
        loveAnimation();
      }

      if (team.animationType === "dream") {
        dreamAnimation();
      }

      if (team.animationType === "passion") {
        passionAnimation();
      }
    }

    function loveAnimation() {
      const icons = ["💖", "💗", "💕", "💞", "❤️"];

      for (let i = 0; i < 38; i++) {
        setTimeout(() => {
          createEffect({
            text: icons[Math.floor(Math.random() * icons.length)],
            className: "love-effect",
            bottom: 70,
            sizeMin: 20,
            sizeMax: 35
          });
        }, i * 45);
      }
    }

    function dreamAnimation() {
      const icons = ["⭐", "🌟", "✨", "💫", "🌙"];

      for (let i = 0; i < 44; i++) {
        setTimeout(() => {
          createEffect({
            text: icons[Math.floor(Math.random() * icons.length)],
            className: "dream-effect",
            bottom: Math.random() * 230 + 70,
            sizeMin: 18,
            sizeMax: 33
          });
        }, i * 55);
      }
    }

    function passionAnimation() {
      const icons = ["🔥", "⚡", "✨", "🟠", "💥"];

      for (let i = 0; i < 46; i++) {
        setTimeout(() => {
          createEffect({
            text: icons[Math.floor(Math.random() * icons.length)],
            className: "passion-effect",
            bottom: 60,
            sizeMin: 20,
            sizeMax: 37
          });
        }, i * 38);
      }
    }

    function createEffect(setting) {
      const item = document.createElement("div");

      item.className = "effect-item " + setting.className;
      item.textContent = setting.text;

      item.style.left = Math.random() * window.innerWidth + "px";
      item.style.bottom = setting.bottom + "px";

      const size =
        Math.random() * (setting.sizeMax - setting.sizeMin) + setting.sizeMin;

      item.style.fontSize = size + "px";

      document.body.appendChild(item);

      setTimeout(() => {
        item.remove();
      }, 3300);
    }

    function showToast(text) {
      toast.innerText = text;
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    changeTeam("love");
  </script>

</body>
</html>
